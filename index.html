<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>EasyCoin Help</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
:root {
  --accent: #4f46e5;
  --text-main: #f9fafb;
  --text-muted: #9ca3af;
}

* { box-sizing: border-box; margin:0; padding:0; }

body {
  font-family: system-ui;
  background: #020617;
  color: var(--text-main);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

/* APP SHELL */
.app-shell {
  display:flex;
  flex-direction:column;
  width:100%;
  max-width:1100px;
  border-radius:20px;
  overflow:hidden;
  border:1px solid #1f2937;
  background:#020617;
}

/* HEADER */
.top-header {
  width:100%;
  background:#0f172a;
  border-bottom:1px solid #1f2937;
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo-img {
  height:40px;
  object-fit:contain;
}

.header-right {
  display:flex;
  align-items:center;
  gap:15px;
}

.balance-box {
  display:flex;
  align-items:center;
  gap:6px;
  background:#111827;
  padding:6px 12px;
  border-radius:10px;
  border:1px solid #1f2937;
}

.balance {
  font-weight:600;
  color:#facc15;
}

/* MOBILE MENU BUTTON */
.mobile-header {
  display:none;
  width:100%;
  background:#0f172a;
  padding:10px 20px;
  border-bottom:1px solid #1f2937;
}

#mobileMenuBtn {
  font-size:26px;
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}

/* MOBILE DROPDOWN MENU */
.mobile-accordion {
  display:none;
  background:#111827;
  padding:10px;
  border-bottom:1px solid #1f2937;
}

.accordion-item {
  background:#1f2937;
  margin:6px 0;
  border-radius:10px;
}

.accordion-header {
  padding:12px;
  cursor:pointer;
  font-weight:600;
  color:white;
  display:flex;
  align-items:center;
  gap:10px;
}

/* MAIN AREA */
.main-area {
  display:flex;
  width:100%;
}

/* SIDEBAR */
.sidebar {
  width:220px;
  background:#020617;
  border-right:1px solid #1f2937;
  padding:15px;
}

.nav-item {
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  color:var(--text-muted);
  display:flex;
  align-items:center;
  gap:10px;
}

.nav-item.active {
  background:#111827;
  color:#fff;
}

/* CONTENT */
.content {
  flex:1;
  padding:20px;
}

.section {
  display:none;
}

.section.active {
  display:block;
}

.panel {
  border:1px solid #1f2937;
  border-radius:14px;
  padding:16px;
  margin-top:10px;
}

.panel-title {
  font-weight:600;
  margin-bottom:10px;
}

.panel-text {
  color:var(--text-muted);
  font-size:14px;
}

/* MOBILE RESPONSIVE */
@media(max-width:768px){
  .sidebar { display:none; }
  .mobile-header { display:flex; justify-content:flex-start; }
  .main-area { flex-direction:column; }
}
</style>
</head>

<body>

<div class="app-shell">

  <!-- HEADER -->
  <header class="top-header">
    <img class="logo-img" src="https://i.postimg.cc/4xGbphPW/Screenshot-2026-04-12-at-3-41-51-PM-removebg-preview.png" alt="Logo">

    <div class="header-right">
      <div class="balance-box">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#facc15">
          <circle cx="12" cy="12" r="10" stroke="#eab308" stroke-width="2"/>
          <text x="12" y="16" text-anchor="middle" font-size="12" fill="#000">★</text>
        </svg>
        <span class="balance">100</span>
      </div>
    </div>
  </header>

  <!-- MOBILE MENU BUTTON -->
  <div class="mobile-header">
    <button id="mobileMenuBtn">☰</button>
  </div>

  <!-- MOBILE DROPDOWN MENU -->
  <div class="mobile-accordion" id="mobileAccordion">

    <div class="accordion-item">
      <div class="accordion-header" data-target="earn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
          <path d="M12 2l7 7-7 13L5 9l7-7z"/>
        </svg>
        Earn
      </div>
    </div>

    <div class="accordion-item">
      <div class="accordion-header" data-target="shop">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
          <circle cx="9" cy="21" r="1"/>
          <circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l3.6 7.59L6 14h13l3-7H6"/>
        </svg>
        Shop
      </div>
    </div>

    <div class="accordion-item">
      <div class="accordion-header" data-target="leaders">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
          <path d="M8 21h8M12 17v4M7 4v2a5 5 0 0 0 10 0V4H7z"/>
          <path d="M5 4H2v2a5 5 0 0 0 5 5"/>
          <path d="M19 4h3v2a5 5 0 0 1-5 5"/>
        </svg>
        Leaders
      </div>
    </div>

    <div class="accordion-item">
      <div class="accordion-header" data-target="help">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 1 1 5.83 1c0 2-3 3-3 3"/>
          <circle cx="12" cy="17" r="1"/>
        </svg>
        Help
      </div>
    </div>

    <div class="accordion-item">
      <div class="accordion-header" data-target="chat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Chat
      </div>
    </div>

  </div>

  <!-- MAIN AREA -->
  <div class="main-area">

    <!-- SIDEBAR (DESKTOP) -->
    <aside class="sidebar">

      <div class="nav-item active" data-target="earn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
          <path d="M12 2l7 7-7 13L5 9l7-7z"/>
        </svg>
        Earn
      </div>

      <div class="nav-item" data-target="shop">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
          <circle cx="9" cy="21" r="1"/>
          <circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l3.6 7.59L6 14h13l3-7H6"/>
        </svg>
        Shop
      </div>

      <div class="nav-item" data-target="leaders">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
          <path d="M8 21h8M12 17v4M7 4v2a5 5 0 0 0 10 0V4H7z"/>
          <path d="M5 4H2v2a5 5 0 0 0 5 5"/>
          <path d="M19 4h3v2a5 5 0 0 1-5 5"/>
        </svg>
        Leaders
      </div>

      <div class="nav-item" data-target="help">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 1 1 5.83 1c0 2-3 3-3 3"/>
          <circle cx="12" cy="17" r="1"/>
        </svg>
        Help
      </div>

      <div class="nav-item" data-target="chat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Chat
      </div>

    </aside>

    <!-- CONTENT -->
    <main class="content">

      <div class="section active" id="section-earn">
        <div class="panel">
          <div class="panel-title">Earn Diamonds</div>
          <div class="panel-text">Earn by completing surveys, offers, and apps.</div>
        </div>
      </div>

      <div class="section" id="section-shop">
        <div class="panel">
          <div class="panel-title">Shop</div>
          <div class="panel-text">Spend diamonds on rewards and withdrawals.</div>
        </div>
      </div>

      <div class="section" id="section-leaders">
        <div class="panel">
          <div class="panel-title">Leaders</div>
          <div class="panel-text">See top users and leaderboard rankings.</div>
        </div>
      </div>

      <div class="section" id="section-help">
        <div class="panel">
          <div class="panel-title">Help</div>
          <div class="panel-text">FAQ and support information.</div>
        </div>
      </div>

      <div class="section" id="section-chat">
        <div class="panel">
          <div class="panel-title">Chat</div>
          <div class="panel-text">Community chat and messaging.</div>
        </div>
      </div>

    </main>

  </div>

</div>

<script>
// SWITCH SECTIONS
const navItems = document.querySelectorAll(".nav-item");
const sections = document.querySelectorAll(".section");
const accordionHeaders = document.querySelectorAll(".accordion-header");

function switchSection(target){
  sections.forEach(s => s.classList.remove("active"));
  document.getElementById("section-" + target).classList.add("active");

  navItems.forEach(n => n.classList.toggle("active", n.dataset.target === target));
}

// DESKTOP NAV
navItems.forEach(item => {
  item.addEventListener("click", () => switchSection(item.dataset.target));
});

// MOBILE MENU BUTTON
document.getElementById("mobileMenuBtn").onclick = () => {
  const acc = document.getElementById("mobileAccordion");
  acc.style.display = acc.style.display === "block" ? "none" : "block";
};

// MOBILE MENU ITEM CLICK
accordionHeaders.forEach(header => {
  header.addEventListener("click", () => {
    switchSection(header.dataset.target);
    document.getElementById("mobileAccordion").style.display = "none";
  });
});
</script>

</body>
</html>
